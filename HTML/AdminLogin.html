<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swaad Login</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <link rel="stylesheet" href="../CSS/AdminLogin.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <span><i class="fa-solid fa-phone"></i> (+91)IND</span>
      <span><i class="fa-solid fa-envelope"></i> swaadinfo@gmail.com</span>
    </div>

    <div class="top-right">
      <i class="fa-brands fa-twitter"></i>
      <i class="fa-brands fa-facebook-f"></i>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-github"></i>
    </div>
  </div>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- NAV -->
    <nav class="navbar">
      <h1 class="logo">Swaad</h1>
    </nav>

    <!-- LOGIN CONTENT -->
    <div class="login-content">

      <h2>Admin Login</h2>
      <p>Welcome back! Please login to your account.</p>

      <!-- LOGIN CARD -->
      <div class="login-card">

        <form id="loginForm">

          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
          </div>

          

          <button type="submit" class="login-btn">Login</button>

          <div class="divider">
            <span>or Login with</span>
          </div>

          <button type="button" class="social-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="google">
            Continue with Google
          </button>

          <button type="button" class="social-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="facebook">
            Continue with Facebook
          </button>

          <div class="signup-text">
            Admin access only</div>

        </form>
      </div>


    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="footer-container">

      <!-- LEFT -->
      <div class="footer-left">
        <h2>Swaad</h2>
        <h4>taste of India</h4>

        <p>
          Is the new era of technology we look in the future with certainty and pride
          to our company and.
        </p>

        <div class="social-icons">
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-github"></i></a>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="footer-right">

        <h4>Follow Us On Instagram</h4>

        <div class="gallery">
          <img src="../Images/paratha.jpg" alt="food">

          <img src="../Images/images.jpg" alt="food">

          <img src="../Images/Curd-Rice.jpg" alt="food">

          <img src="../Images/shahi paneer.webp" alt="food">
        </div>

      </div>

    </div>

    <div class="footer-bottom">
      © 2024. All Rights Reserved
    </div>

  </footer>

  <script src="../JS/AdminLogin.js"></script>
</body>
</html>
